<style>

body{
  margin:0;

  margin-top:10px;

<body>

<iframe
  id="jobsWidget"
  src="https://jobs-in.us/display/jobs-search-widget.php"
  loading="lazy">

  Local jobs search widget by
  <a href="https://jobs-in.us/find/country,US" target="_blank">
    jobs-in.us
  </a>
</div>

<script>

window.addEventListener('message', e => {

  if(
    e.data &&
    e.data.type === 'jobsWidgetResize'
  ){
    document.getElementById('jobsWidget')
      .style.height = e.data.height + 'px';
  }

});

</script>

</body>
